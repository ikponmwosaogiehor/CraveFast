<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CraveFast | Sign Up</title>
    <link rel="stylesheet" href="./asset/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="shortcut icon" href="./asset/img/favicon/favicon_io/favicon.ico" type="image/x-icon">
</head>
<body class="menu_body">

    <section class="login_head">
            <img src="./asset/img/favicon/ChatGPT Image Jun 26, 2026, 08_16_59 AM.png" width="50px" height="50px" alt="">
        <h1>CraveFast</h1>
        <p>Feul your hunger in seconds</p>
    </section>
    <section class="reg_container">
        <form action="./index.html">
            <div class="login_box">
                <div class="intro_log">
                    <h1 class="reg_h1">Welcome To CraveFast! <i class="fa-solid fa-person-arrow-down-to-line"></i></h1>
                    <p>Please Enter Your Details</p>
                </div>
                <div class="form-group">
                    <label for="fullName">FullName</label>
                    <input type="text" name="fullName" placeholder="FirstName | OtherName | Surname">
                </div>
                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select name="gender">
                        <option selected value="">Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="dob">Date Of Birth</label>
                    <input type="date" name="dob">
                </div>
                <div class="form-group">
                    <label for="phonenumber">Phone Number</label>
                    <input type="tel" name="phonenumber" placeholder="Enter Your Phone Number">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" name="email" placeholder="Enter Your Email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" name="password" placeholder="Enter Your Password">                    
                </div>
                <div class="form-group reg_btn_sec">
                    <button name="submit" type="submit">Submit</button>
                </div>
                <div class="regs">
                    <h4>Already a member? <a href="./login.html">Log In</a></h4>
                </div>
            </div>
        </form>
    </section>

    
</body>
</html>
